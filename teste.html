<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <title>Teste Assinatura</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; padding: 20px; }
    input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #9b8732; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    button:hover { opacity: 0.85; }
    #resultado { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 14px; display: none; }
    .sucesso { background: #e8f5e9; color: #2e7d32; }
    .erro { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <h2>Teste — Criar Assinatura</h2>
  <input id="nome" placeholder="Nome completo" value="Suellen Seragi"/>
  <input id="telefone" placeholder="Telefone (com DDD)" value=""/>
  <input id="email" placeholder="Email (conta Mercado Pago)" value=""/>
  <button onclick="assinar()">Gerar Link de Pagamento</button>
  <div id="resultado"></div>

  <script>
    async function assinar() {
      const nome = document.getElementById('nome').value.trim();
      const telefone = document.getElementById('telefone').value.trim();
      const email = document.getElementById('email').value.trim();
      const resultado = document.getElementById('resultado');

      if (!nome || !telefone || !email) {
        resultado.className = 'erro';
        resultado.style.display = 'block';
        resultado.textContent = 'Preencha todos os campos.';
        return;
      }

      resultado.style.display = 'block';
      resultado.className = '';
      resultado.textContent = 'Aguarde...';

      try {
        const resp = await fetch('https://comunidade-backend-production.up.railway.app/assinar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome, telefone, email })
        });

        const data = await resp.json();

        if (data.init_point) {
          resultado.className = 'sucesso';
          resultado.innerHTML = `✅ Link gerado!<br><br><a href="${data.init_point}" target="_blank">👉 Clique aqui para pagar</a>`;
        } else {
          resultado.className = 'erro';
          resultado.textContent = '❌ Erro: ' + (data.error || 'Resposta inesperada');
        }
      } catch (err) {
        resultado.className = 'erro';
        resultado.textContent = '❌ Erro de conexão: ' + err.message;
      }
    }
  </script>
</body>
</html>
